<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artwork Template Generator</title>
  <style>
    :root { --bg:#f8fafc; --card:#fff; --border:#cbd5e1; --text:#0f172a; --muted:#475569; --danger:#dc2626; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,sans-serif; background:var(--bg); color:var(--text); }
    .app { max-width:1400px; margin:0 auto; padding:24px; display:grid; grid-template-columns:390px 1fr; gap:24px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:18px; overflow:hidden; }
    .card-header { padding:20px 20px 0; }
    .card-title { margin:0; font-size:22px; font-weight:700; }
    .card-content { padding:20px; }
    .section-space > * + * { margin-top:16px; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    label { display:block; font-size:14px; font-weight:600; margin-bottom:8px; color:var(--muted); }
    input,select,textarea,button { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:12px; font:inherit; background:#fff; }
    textarea { min-height:90px; resize:vertical; }
    .button { background:var(--text); color:#fff; border:none; font-weight:700; cursor:pointer; }
    .button:disabled { opacity:.65; cursor:not-allowed; }
    .muted-box { background:#f1f5f9; border-radius:14px; padding:16px; }
    .separator { height:1px; background:#e2e8f0; }
    .preview-shell { min-height:760px; border:1px solid var(--border); border-radius:16px; padding:24px; background:#fff; display:flex; justify-content:center; align-items:center; overflow:auto; }
    .detail-list > * + * { margin-top:10px; }
    .detail-row { display:grid; grid-template-columns:210px 1fr; gap:10px; font-size:14px; }
    .detail-row .label { font-weight:700; color:var(--muted); }
    .error { color:var(--danger); font-size:14px; white-space:pre-wrap; }
    .ok { color:#166534; font-size:14px; }
    .right-col > * + * { margin-top:24px; }
    @media (max-width:1100px) { .app { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="card-header"><h1 class="card-title">Artwork Template Generator</h1></div>
      <div class="card-content section-space">
        <div class="grid-2">
          <div><label for="w">Visible Width</label><input id="w" type="number" min="0" step="any" value="1000" /></div>
          <div><label for="h">Visible Height</label><input id="h" type="number" min="0" step="any" value="2000" /></div>
        </div>
        <div class="grid-2">
          <div>
            <label for="unit">Unit</label>
            <select id="unit">
              <option value="mm">mm</option>
              <option value="cm">cm</option>
              <option value="m">m</option>
              <option value="ft">ft</option>
              <option value="in">inches</option>
            </select>
          </div>
          <div>
            <label for="material">Print Type</label>
            <select id="material">
              <option>Foamex / Hard Materials</option>
              <option>Vinyl</option>
              <option>Set Wrap</option>
              <option>Silicon Edge</option>
              <option>Custom Bleed</option>
            </select>
          </div>
        </div>
        <div id="customBleedWrap" style="display:none;">
          <label for="customBleed">Custom Bleed (mm)</label>
          <input id="customBleed" type="number" min="0" step="any" value="10" />
        </div>
        <div>
          <label for="ppi">Pixels Per Inch</label>
          <input id="ppi" type="number" min="1" step="1" value="90" />
        </div>
        <div class="separator"></div>
        <div><label for="job">Job Reference</label><input id="job" type="text" /></div>
        <div><label for="art">Artwork Reference</label><input id="art" type="text" /></div>
        <div><label for="date">Artwork Due Date</label><input id="date" type="date" /></div>
        <div><label for="note">Submission Note</label><textarea id="note">All artwork should be submitted as high resolution PDFs.</textarea></div>
        <div class="separator"></div>
        <div class="muted-box"><div style="font-weight:700;margin-bottom:8px;">Material rule</div><div id="rule"></div></div>
        <button id="exportBtn" class="button" type="button">Export PDF</button>
        <div id="ok" class="ok" style="display:none;">PDF download started.</div>
        <div id="err" class="error" style="display:none;"></div>
      </div>
    </div>

    <div class="right-col">
      <div class="card">
        <div class="card-header"><h2 class="card-title">Live Preview</h2></div>
        <div class="card-content"><div class="preview-shell"><canvas id="previewCanvas" width="900" height="900"></canvas></div></div>
      </div>
      <div class="card">
        <div class="card-header"><h2 class="card-title">Calculated Output</h2></div>
        <div class="card-content"><div id="details" class="detail-list"></div></div>
      </div>
    </div>
  </div>

  <script>
    const MM_PER_INCH = 25.4;
    const PREVIEW_MAX = 780;
    const MAX_PDF_MM = 20000;
    const PT_PER_MM = 72 / 25.4;
    const LARGE_FORMAT_THRESHOLD_MM = 7500;

    const MATERIALS = {
      "Foamex / Hard Materials": { bleedMm: 5, wrapMm: 0, showWrapLine: false, notes: "5mm bleed on all edges" },
      "Vinyl": { bleedMm: 10, wrapMm: 0, showWrapLine: false, notes: "10mm bleed on all edges" },
      "Set Wrap": { bleedMm: 50, wrapMm: 100, showWrapLine: true, notes: "100mm wrapped edge plus an additional 50mm bleed on all edges" },
      "Silicon Edge": { bleedMm: 50, wrapMm: 0, showWrapLine: false, notes: "50mm bleed on all edges" },
      "Custom Bleed": { bleedMm: 10, wrapMm: 0, showWrapLine: false, notes: "Custom bleed on all edges" }
    };
    const UNIT_TO_MM = { mm:1, cm:10, m:1000, ft:304.8, in:25.4 };
    const el = id => document.getElementById(id);
    const inputs = ["w","h","unit","material","customBleed","ppi","job","art","date","note"];

    function round(v,d=2){ const f=10**d; return Math.round(v*f)/f; }
    function toMm(v,u){ return (Number(v||0)||0) * (UNIT_TO_MM[u]||1); }
    function mmToPx(mm, ppi){ return Math.round((mm / MM_PER_INCH) * Number(ppi || 0)); }
    function fmtDate(v){ if(!v) return "—"; const d=new Date(v); return Number.isNaN(d.getTime()) ? v : d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}); }
    function safeName(v,fallback){ const s=String(v||"").trim().replace(/[\\/:*?"<>|]+/g,"-").replace(/\s+/g," ").trim(); return s || fallback; }
    function filename(s){ return `${safeName(s.job,"Job Reference")} - ${safeName(s.art,"Artwork Reference")} - Artwork Template.pdf`; }
    function pdfEscape(str){ return String(str).replace(/\\/g,"\\\\").replace(/\(/g,"\\(").replace(/\)/g,"\\)"); }

    function textWidthApprox(text, size) {
      const widths = {
        " ": 0.278, "!": 0.278, '"': 0.355, "#": 0.556, "$": 0.556, "%": 0.889, "&": 0.667, "'": 0.191,
        "(": 0.333, ")": 0.333, "*": 0.389, "+": 0.584, ",": 0.278, "-": 0.333, ".": 0.278, "/": 0.278,
        "0": 0.556, "1": 0.556, "2": 0.556, "3": 0.556, "4": 0.556, "5": 0.556, "6": 0.556, "7": 0.556, "8": 0.556, "9": 0.556,
        ":": 0.278, ";": 0.278, "<": 0.584, "=": 0.584, ">": 0.584, "?": 0.556, "@": 1.015,
        "A": 0.667, "B": 0.667, "C": 0.722, "D": 0.722, "E": 0.667, "F": 0.611, "G": 0.778, "H": 0.722, "I": 0.278, "J": 0.500,
        "K": 0.667, "L": 0.556, "M": 0.833, "N": 0.722, "O": 0.778, "P": 0.667, "Q": 0.778, "R": 0.722, "S": 0.667, "T": 0.611,
        "U": 0.722, "V": 0.667, "W": 0.944, "X": 0.667, "Y": 0.667, "Z": 0.611,
        "[": 0.278, "\\": 0.278, "]": 0.278, "^": 0.469, "_": 0.556, "`": 0.333,
        "a": 0.556, "b": 0.556, "c": 0.500, "d": 0.556, "e": 0.556, "f": 0.278, "g": 0.556, "h": 0.556, "i": 0.222, "j": 0.222,
        "k": 0.500, "l": 0.222, "m": 0.833, "n": 0.556, "o": 0.556, "p": 0.556, "q": 0.556, "r": 0.333, "s": 0.500, "t": 0.278,
        "u": 0.556, "v": 0.500, "w": 0.722, "x": 0.500, "y": 0.500, "z": 0.500,
        "{": 0.334, "|": 0.260, "}": 0.334, "~": 0.584, "—": 1.000, "×": 0.584
      };
      let total = 0;
      for (const ch of String(text || "")) total += widths[ch] ?? 0.556;
      return total * size;
    }

    function wrapText(text, maxWidth, fontSize){
      const words = String(text || "—").split(/\s+/).filter(Boolean);
      if (!words.length) return ["—"];
      const lines = []; let line = words[0];
      for (let i=1;i<words.length;i++) {
        const test = line + " " + words[i];
        if (textWidthApprox(test, fontSize) <= maxWidth) line = test; else { lines.push(line); line = words[i]; }
      }
      lines.push(line);
      return lines;
    }

    function getState(){
      const material = el("material").value;
      const base = MATERIALS[material];
      const customBleed = Math.max(0, Number(el("customBleed").value) || 0);
      const cfg = {
        bleedMm: material === "Custom Bleed" ? customBleed : base.bleedMm,
        wrapMm: base.wrapMm,
        showWrapLine: base.showWrapLine,
        notes: material === "Custom Bleed" ? `${customBleed}mm custom bleed on all edges` : base.notes
      };
      const visibleWmm = toMm(el("w").value, el("unit").value);
      const visibleHmm = toMm(el("h").value, el("unit").value);
      const ppi = Math.max(1, Number(el("ppi").value) || 1);
      const sizeWithWrapWmm = visibleWmm + cfg.wrapMm * 2;
      const sizeWithWrapHmm = visibleHmm + cfg.wrapMm * 2;
      const totalWmm = sizeWithWrapWmm + cfg.bleedMm * 2;
      const totalHmm = sizeWithWrapHmm + cfg.bleedMm * 2;
      return {
        material, cfg, visibleWmm, visibleHmm, ppi, sizeWithWrapWmm, sizeWithWrapHmm, totalWmm, totalHmm,
        visibleWpx:mmToPx(visibleWmm,ppi), visibleHpx:mmToPx(visibleHmm,ppi), wrapWpx:mmToPx(sizeWithWrapWmm,ppi), wrapHpx:mmToPx(sizeWithWrapHmm,ppi), totalWpx:mmToPx(totalWmm,ppi), totalHpx:mmToPx(totalHmm,ppi),
        job: el("job").value.trim(), art: el("art").value.trim(), date: el("date").value, note: el("note").value.trim() || "—"
      };
    }

    function fitPreview(w,h){ const big=Math.max(w,h,1); const scale=PREVIEW_MAX/big; return { width:Math.max(60,w*scale), height:Math.max(60,h*scale), scale }; }

    function getLayout(s, preview){
      const p = preview || fitPreview(s.totalWmm, s.totalHmm);
      const isLargeFormat = s.totalWmm > LARGE_FORMAT_THRESHOLD_MM || s.totalHmm > LARGE_FORMAT_THRESHOLD_MM;
      const info = [
        `Visible: ${round(s.visibleWmm,1)} × ${round(s.visibleHmm,1)} mm`,
        `Pixels: ${s.visibleWpx.toLocaleString()} × ${s.visibleHpx.toLocaleString()} px`,
        ...(s.material === "Set Wrap" ? [
          `Incl. Wrap: ${round(s.sizeWithWrapWmm,1)} × ${round(s.sizeWithWrapHmm,1)} mm`,
          `Wrap Pixels: ${s.wrapWpx.toLocaleString()} × ${s.wrapHpx.toLocaleString()} px`
        ] : []),
        `Incl. Bleed: ${round(s.totalWmm,1)} × ${round(s.totalHmm,1)} mm`,
        `Bleed Pixels: ${s.totalWpx.toLocaleString()} × ${s.totalHpx.toLocaleString()} px`,
        `Job Ref: ${s.job || "—"}`,
        `Artwork Ref: ${s.art || "—"}`,
        `Deadline: ${fmtDate(s.date)}`,
        ...(isLargeFormat ? ["Note: For prints where a dimension exceeds 7.5m, large format mode is applied."] : [])
      ];
      const lineGap = Math.max(14, p.height * (isLargeFormat ? 0.029 : 0.026));
      const titleFont = Math.max(14, p.height * (isLargeFormat ? 0.026 : 0.023));
      const infoFont = Math.max(10, p.height * (isLargeFormat ? 0.015 : 0.0135));
      const noteFont = Math.max(10, p.height * (isLargeFormat ? 0.014 : 0.0125));
      const guideFont = Math.max(10, p.height * 0.013);
      const titleToTextGap = Math.max(18, p.height * 0.03);
      const panelPaddingTop = Math.max(18, p.height * 0.022);
      const panelPaddingBottom = Math.max(18, p.height * 0.022);
      const textBlockHeight = info.length * lineGap;
      const panelW = p.width * (isLargeFormat ? 0.62 : 0.56);
      const panelH = Math.max(160, panelPaddingTop + titleToTextGap + textBlockHeight + panelPaddingBottom);
      const noteGap = Math.max(20, p.height * 0.03);
      const totalBlockH = panelH + noteGap + 18;
      const blockTop = (p.height - totalBlockH) / 2;
      const panelX = (p.width - panelW) / 2;
      const panelY = blockTop;
      const titleBaseY = panelY + panelPaddingTop + (isLargeFormat ? 6 : 4);
      const firstLineY = titleBaseY + titleToTextGap;
      return { preview:p, info, lineGap, panelW, panelH, panelX, panelY, noteGap, titleBaseY, firstLineY, titleFont, infoFont, noteFont, guideFont, isLargeFormat };
    }

    function drawWrappedCentered(ctx,text,x,y,maxWidth,lineHeight,fontSize){
      const lines = wrapText(text, maxWidth, fontSize);
      lines.forEach((line,i)=>ctx.fillText(line,x,y+i*lineHeight));
      return lines.length * lineHeight;
    }

    function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

    function renderDetails(s){
      const rows = [
        ["Visible Area (mm)", `${round(s.visibleWmm,2)} × ${round(s.visibleHmm,2)}`],
        ["Visible Area (pixels)", `${s.visibleWpx.toLocaleString()} × ${s.visibleHpx.toLocaleString()}`],
        ...(s.material === "Set Wrap" ? [["Including Wrapped Edge (mm)", `${round(s.sizeWithWrapWmm,2)} × ${round(s.sizeWithWrapHmm,2)}`],["Including Wrapped Edge (pixels)", `${s.wrapWpx.toLocaleString()} × ${s.wrapHpx.toLocaleString()}`]] : []),
        ["Including Bleed (mm)", `${round(s.totalWmm,2)} × ${round(s.totalHmm,2)}`],
        ["Including Bleed (pixels)", `${s.totalWpx.toLocaleString()} × ${s.totalHpx.toLocaleString()}`],
        ["Job Reference", s.job || "—"], ["Artwork Reference", s.art || "—"], ["Artwork Deadline", fmtDate(s.date)], ["Submission Note", s.note]
      ];
      el("details").innerHTML = rows.map(r => `<div class="detail-row"><div class="label">${r[0]}</div><div>${r[1]}</div></div>`).join("");
    }

    function drawPreview(){
      const s = getState();
      el("customBleedWrap").style.display = s.material === "Custom Bleed" ? "block" : "none";
      el("rule").textContent = s.cfg.notes;
      el("err").style.display = "none";
      el("ok").style.display = "none";
      const fit = fitPreview(s.totalWmm, s.totalHmm);
      const c = el("previewCanvas");
      const ctx = c.getContext("2d");
      c.width = fit.width; c.height = fit.height;
      const l = getLayout(s, fit);
      ctx.clearRect(0,0,c.width,c.height);
      ctx.fillStyle = "#fff"; ctx.fillRect(0,0,c.width,c.height);
      ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = Math.max(1, c.width/900); ctx.strokeRect(0,0,c.width,c.height);
      ctx.strokeStyle = "#dc2626"; ctx.lineWidth = Math.max(2, c.width/450); ctx.strokeRect(s.cfg.bleedMm*l.preview.scale, s.cfg.bleedMm*l.preview.scale, s.sizeWithWrapWmm*l.preview.scale, s.sizeWithWrapHmm*l.preview.scale);
      if (s.cfg.showWrapLine) { ctx.strokeStyle = "#000"; ctx.strokeRect((s.cfg.bleedMm+s.cfg.wrapMm)*l.preview.scale, (s.cfg.bleedMm+s.cfg.wrapMm)*l.preview.scale, s.visibleWmm*l.preview.scale, s.visibleHmm*l.preview.scale); }
      ctx.fillStyle = "#fff"; ctx.strokeStyle = "#94a3b8"; roundRect(ctx,l.panelX,l.panelY,l.panelW,l.panelH,Math.max(8,c.width/90)); ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#0f172a"; ctx.textAlign = "center"; ctx.font = `700 ${l.titleFont}px Arial`; ctx.fillText("Artwork Template", l.preview.width/2, l.titleBaseY);
      ctx.font = `${l.infoFont}px Arial`; l.info.forEach((line,i)=>ctx.fillText(line, l.preview.width/2, l.firstLineY + i*l.lineGap));
      ctx.font = `${l.noteFont}px Arial`; drawWrappedCentered(ctx, s.note, l.preview.width/2, l.panelY+l.panelH+l.noteGap, l.preview.width*0.7, l.noteFont*1.2, l.noteFont);
      ctx.fillStyle = "#475569"; ctx.font = `${l.guideFont}px Arial`; ctx.fillText(`Red line = bleed boundary${s.cfg.showWrapLine ? " | Black line = visible area boundary / wrap starts outside it" : ""}`, l.preview.width/2, l.preview.height - Math.max(12, l.guideFont*1.2));
      renderDetails(s);
    }

    function buildVectorPdfBlob(s){
      const widthPt = s.totalWmm * PT_PER_MM;
      const heightPt = s.totalHmm * PT_PER_MM;
      const scale = PT_PER_MM;
      const l = getLayout(s, { width:s.totalWmm, height:s.totalHmm, scale:1 });
      let stream = "";
      const topY = (mm) => heightPt - (mm * PT_PER_MM);
      const rectStroke = (x,y,w,h,r,g,b,lineWmm) => {
        stream += `${r} ${g} ${b} RG\n${Math.max(lineWmm * scale, 0.8)} w\n${x*scale} ${topY(y+h)} ${w*scale} ${h*scale} re S\n`;
      };
      const rectFillStroke = (x,y,w,h,fr,fg,fb,sr,sg,sb,lineWmm) => {
        stream += `${fr} ${fg} ${fb} rg\n${sr} ${sg} ${sb} RG\n${Math.max(lineWmm * scale, 0.8)} w\n${x*scale} ${topY(y+h)} ${w*scale} ${h*scale} re B\n`;
      };
      const textLine = (text, xCenterMm, yMm, fontSizePt, r,g,b) => {
        const xPt = xCenterMm * scale - textWidthApprox(text, fontSizePt)/2;
        const yPt = topY(yMm);
        stream += `BT\n/F1 ${fontSizePt} Tf\n${r} ${g} ${b} rg\n1 0 0 1 ${xPt} ${yPt} Tm\n(${pdfEscape(text)}) Tj\nET\n`;
      };
      const wrappedTextCentered = (text, xCenterMm, yMm, maxWidthMm, fontSizePt, lineHeightMm, r,g,b) => {
        const lines = wrapText(text, maxWidthMm * scale, fontSizePt);
        lines.forEach((line,i)=>textLine(line, xCenterMm, yMm + i*lineHeightMm, fontSizePt, r,g,b));
      };

      stream += `1 1 1 rg\n0 0 ${widthPt} ${heightPt} re f\n`;
      rectStroke(s.cfg.bleedMm, s.cfg.bleedMm, s.sizeWithWrapWmm, s.sizeWithWrapHmm, 0.8627, 0.1490, 0.1490, 0.4);
      if (s.cfg.showWrapLine) rectStroke(s.cfg.bleedMm + s.cfg.wrapMm, s.cfg.bleedMm + s.cfg.wrapMm, s.visibleWmm, s.visibleHmm, 0, 0, 0, 0.5);
      rectFillStroke(l.panelX, l.panelY, l.panelW, l.panelH, 1,1,1, 0.5804,0.6392,0.7216, 0.3);
      const centerX = s.totalWmm / 2;
      textLine("Artwork Template", centerX, l.titleBaseY, l.titleFont * PT_PER_MM, 0.0588,0.0902,0.1647);
      l.info.forEach((line,i)=>textLine(line, centerX, l.firstLineY + i*l.lineGap, l.infoFont * PT_PER_MM, 0.0588,0.0902,0.1647));
      wrappedTextCentered(s.note, centerX, l.panelY + l.panelH + l.noteGap, s.totalWmm * 0.7, l.noteFont * PT_PER_MM, l.noteFont * 1.2, 0.0588,0.0902,0.1647);
      textLine(`Red line = bleed boundary${s.cfg.showWrapLine ? " | Black line = visible area boundary / wrap starts outside it" : ""}`, centerX, s.totalHmm - Math.max(12, l.guideFont*1.2), l.guideFont * PT_PER_MM, 0.2784,0.3333,0.4118);

      const objects = [];
      const add = (s) => (objects.push(s), objects.length);
      const fontId = add("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>");
      const contentId = add(`<< /Length ${new TextEncoder().encode(stream).length} >>\nstream\n${stream}\nendstream`);
      const pageId = add(`<< /Type /Page /Parent 0 0 R /MediaBox [0 0 ${widthPt} ${heightPt}] /Resources << /Font << /F1 ${fontId} 0 R >> >> /Contents ${contentId} 0 R >>`);
      const pagesId = add(`<< /Type /Pages /Kids [${pageId} 0 R] /Count 1 >>`);
      objects[pageId-1] = objects[pageId-1].replace("/Parent 0 0 R", `/Parent ${pagesId} 0 R`);
      const catalogId = add(`<< /Type /Catalog /Pages ${pagesId} 0 R >>`);
      let pdf = "%PDF-1.4\n%\xE2\xE3\xCF\xD3\n";
      const offsets = [0];
      for(let i=0;i<objects.length;i++){
        offsets.push(new TextEncoder().encode(pdf).length);
        pdf += `${i+1} 0 obj\n${objects[i]}\nendobj\n`;
      }
      const xrefOffset = new TextEncoder().encode(pdf).length;
      pdf += `xref\n0 ${objects.length+1}\n0000000000 65535 f \n`;
      for(let i=1;i<offsets.length;i++) pdf += `${String(offsets[i]).padStart(10,"0")} 00000 n \n`;
      pdf += `trailer\n<< /Size ${objects.length+1} /Root ${catalogId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;
      return new Blob([pdf], {type:"application/pdf"});
    }

    async function exportPDF(){
      const s = getState();
      if (!(s.visibleWmm > 0 && s.visibleHmm > 0 && s.ppi > 0)) return;
      if (s.totalWmm > MAX_PDF_MM || s.totalHmm > MAX_PDF_MM) {
        el("err").textContent = `PDF size exceeds browser-safe limits. Maximum supported side is ${MAX_PDF_MM}mm.`;
        el("err").style.display = "block";
        return;
      }
      const btn = el("exportBtn"); btn.disabled = true; btn.textContent = "Exporting...";
      try {
        const blob = buildVectorPdfBlob(s);
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = filename(s);
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(url),5000);
        el("ok").textContent = "PDF download started."; el("ok").style.display = "block";
      } catch (err) {
        el("err").textContent = err && err.message ? err.message : "PDF export failed.";
        el("err").style.display = "block";
      } finally {
        btn.disabled = false; btn.textContent = "Export PDF";
      }
    }

    inputs.forEach(id => { el(id).addEventListener("input", drawPreview); el(id).addEventListener("change", drawPreview); });
    el("exportBtn").addEventListener("click", exportPDF);
    drawPreview();
  </script>
</body>
</html>
